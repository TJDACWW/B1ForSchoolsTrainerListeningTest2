<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cambridge English B1 Listening Test</title>
  <style>
    :root {
  /* Primitive Color Tokens */
  --color-white: rgba(255, 255, 255, 1);
  --color-black: rgba(0, 0, 0, 1);
  --color-cream-50: rgba(252, 252, 249, 1);
  --color-cream-100: rgba(255, 255, 253, 1);
  --color-gray-200: rgba(245, 245, 245, 1);
  --color-gray-300: rgba(167, 169, 169, 1);
  --color-gray-400: rgba(119, 124, 124, 1);
  --color-slate-500: rgba(98, 108, 113, 1);
  --color-brown-600: rgba(94, 82, 64, 1);
  --color-charcoal-700: rgba(31, 33, 33, 1);
  --color-charcoal-800: rgba(38, 40, 40, 1);
  --color-slate-900: rgba(19, 52, 59, 1);
  --color-teal-300: rgba(50, 184, 198, 1);
  --color-teal-400: rgba(45, 166, 178, 1);
  --color-teal-500: rgba(33, 128, 141, 1);
  --color-teal-600: rgba(29, 116, 128, 1);
  --color-teal-700: rgba(26, 104, 115, 1);
  --color-teal-800: rgba(41, 150, 161, 1);
  --color-red-400: rgba(255, 84, 89, 1);
  --color-red-500: rgba(192, 21, 47, 1);
  --color-orange-400: rgba(230, 129, 97, 1);
  --color-orange-500: rgba(168, 75, 47, 1);

  --color-brown-600-rgb: 94, 82, 64;
  --color-teal-500-rgb: 33, 128, 141;
  --color-slate-900-rgb: 19, 52, 59;
  --color-slate-500-rgb: 98, 108, 113;

  --color-bg-1: rgba(59, 130, 246, 0.08);
  --color-bg-2: rgba(245, 158, 11, 0.08);
  --color-bg-3: rgba(34, 197, 94, 0.08);
  --color-bg-4: rgba(239, 68, 68, 0.08);

  --color-background: var(--color-cream-50);
  --color-surface: var(--color-cream-100);
  --color-text: var(--color-slate-900);
  --color-text-secondary: var(--color-slate-500);
  --color-primary: var(--color-teal-500);
  --color-primary-hover: var(--color-teal-600);
  --color-primary-active: var(--color-teal-700);
  --color-secondary: rgba(var(--color-brown-600-rgb), 0.12);
  --color-secondary-hover: rgba(var(--color-brown-600-rgb), 0.2);
  --color-border: rgba(var(--color-brown-600-rgb), 0.2);
  --color-card-border: rgba(var(--color-brown-600-rgb), 0.12);

  --font-family-base: "FKGroteskNeue", "Geist", "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  --font-size-xs: 11px;
  --font-size-sm: 12px;
  --font-size-base: 14px;
  --font-size-md: 14px;
  --font-size-lg: 16px;
  --font-size-xl: 18px;
  --font-size-2xl: 20px;
  --font-size-3xl: 24px;
  --font-weight-normal: 400;
  --font-weight-medium: 500;
  --font-weight-semibold: 550;
  --font-weight-bold: 600;
  --line-height-normal: 1.5;
  --line-height-tight: 1.2;

  --space-4: 4px;
  --space-8: 8px;
  --space-12: 12px;
  --space-16: 16px;
  --space-20: 20px;
  --space-24: 24px;
  --space-32: 32px;

  --radius-sm: 6px;
  --radius-base: 8px;
  --radius-md: 10px;
  --radius-lg: 12px;

  --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.02);
  --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.04), 0 2px 4px -1px rgba(0, 0, 0, 0.02);

  --duration-fast: 150ms;
  --duration-normal: 250ms;
  --ease-standard: cubic-bezier(0.16, 1, 0.3, 1);
}

@font-face {
  font-family: 'FKGroteskNeue';
  src: url('https://r2cdn.perplexity.ai/fonts/FKGroteskNeue.woff2') format('woff2');
}

* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: var(--font-family-base);
  font-size: var(--font-size-base);
  line-height: var(--line-height-normal);
  color: var(--color-text);
  background-color: var(--color-background);
  -webkit-font-smoothing: antialiased;
  transition: background-color var(--duration-normal) var(--ease-standard), color var(--duration-normal) var(--ease-standard);
}

.app-container {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* Settings Panel */
.settings-panel {
  background-color: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: var(--space-16);
  position: sticky;
  top: 0;
  z-index: 100;
  transition: background-color var(--duration-normal) var(--ease-standard);
}
  .settings-panel.collapsed {
    padding: 6px 8px;
    height: auto;
  }
  .settings-panel .settings-bar {
    display: flex;
    justify-content: flex-start;
    gap: 8px;
    align-items: center;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .settings-panel.collapsed .settings-grid {
    display: none;
  }

.settings-grid {
  display: flex;
  flex-wrap: wrap;
  gap: var(--space-24);
  align-items: center;
  max-width: 1200px;
  margin: 0 auto;
}

.setting-group {
  display: flex;
  align-items: center;
  gap: var(--space-12);
  flex: 1;
  min-width: 200px;
}

  .setting-group.sg-font {
    margin-left: auto;
    justify-content: flex-end;
  }

  .toggle-btn.collapse {
    padding: 6px 8px;
    font-size: 14px;
  }

.setting-label {
  font-weight: var(--font-weight-medium);
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  white-space: nowrap;
}

.toggle-btn {
  padding: var(--space-8) var(--space-16);
  background-color: var(--color-primary);
  color: var(--color-white);
  border: none;
  border-radius: var(--radius-base);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  cursor: pointer;
  transition: background-color var(--duration-fast) var(--ease-standard);
  min-width: 100px;
}

.toggle-btn:hover {
  background-color: var(--color-primary-hover);
}

.toggle-btn.inactive {
  background-color: var(--color-secondary);
  color: var(--color-text);
}

.font-size-control {
  display: flex;
  align-items: center;
  gap: var(--space-8);
}

.font-step-btn {
  width: 34px;
  height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  border-radius: 999px;
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text);
  cursor: pointer;
  font-size: 18px;
  line-height: 1;
}

.font-step-btn:hover {
  background: var(--color-primary);
  color: var(--color-white);
  border-color: var(--color-primary);
}

.font-value {
  font-size: var(--font-size-sm);
  color: var(--color-text-secondary);
  min-width: 35px;
}

.color-scheme-buttons {
  display: flex;
  gap: var(--space-8);
}

.color-btn {
  padding: var(--space-8) var(--space-16);
  background-color: var(--color-secondary);
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-base);
  font-size: var(--font-size-sm);
  font-weight: var(--font-weight-medium);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-standard);
  white-space: nowrap;
}

.color-btn:hover {
  background-color: var(--color-secondary-hover);
}

.color-btn.active {
  background-color: var(--color-primary);
  color: var(--color-white);
  border-color: var(--color-primary);
}

/* Main Layout */
.main-layout {
  display: flex;
  flex: 1;
  max-width: 1400px;
  margin: 0 auto;
  width: 100%;
}

.sidebar {
  width: 250px;
  background-color: var(--color-surface);
  border-right: 1px solid var(--color-border);
  padding: var(--space-24);
  overflow-y: auto;
  transition: transform var(--duration-normal) var(--ease-standard), background-color var(--duration-normal) var(--ease-standard);
  flex-shrink: 0;
}

.mobile-menu-btn {
  display: none;
  position: fixed;
  bottom: var(--space-24);
  right: var(--space-24);
  width: 56px;
  height: 56px;
  background-color: var(--color-primary);
  color: var(--color-white);
  border: none;
  border-radius: 50%;
  font-size: var(--font-size-2xl);
  cursor: pointer;
  box-shadow: var(--shadow-md);
  z-index: 60;
}

.part-nav {
  list-style: none;
}

.part-nav-item {
  margin-bottom: var(--space-8);
}

.part-nav-link {
  display: block;
  padding: var(--space-12) var(--space-16);
  background-color: transparent;
  color: var(--color-text);
  border: 1px solid transparent;
  border-radius: var(--radius-base);
  font-size: var(--font-size-base);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-standard);
  text-align: left;
  width: 100%;
}

.part-nav-link:hover {
  background-color: var(--color-secondary);
}

.part-nav-link.active {
  background-color: var(--color-primary);
  color: var(--color-white);
}

.content-area {
  flex: 1;
  padding: var(--space-32);
  overflow-y: auto;
}

/* Landing Screen */
.landing-screen {
  max-width: 600px;
  margin: 0 auto;
  text-align: center;
}

.landing-screen h1 {
  font-size: var(--font-size-3xl);
  margin-bottom: var(--space-16);
  color: var(--color-text);
}

.landing-screen p {
  font-size: var(--font-size-lg);
  color: var(--color-text-secondary);
  margin-bottom: var(--space-32);
}

.image-upload-section {
  background-color: var(--color-surface);
  border: 2px dashed var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-32);
  margin-bottom: var(--space-32);
}

.image-upload-section h2 {
  font-size: var(--font-size-xl);
  margin-bottom: var(--space-16);
  color: var(--color-text);
}

.image-preview-container {
  display: flex;
  gap: var(--space-16);
  justify-content: center;
  flex-wrap: wrap;
  margin-top: var(--space-24);
}

.image-preview-box {
  position: relative;
  width: 150px;
  text-align: center;
}

.image-preview-box img {
  width: 150px;
  height: 150px;
  object-fit: cover;
  border-radius: var(--radius-base);
  border: 2px solid var(--color-border);
}

.reorder-buttons {
  display: flex;
  justify-content: center;
  gap: var(--space-8);
  margin-top: var(--space-8);
}

.reorder-btn {
  padding: var(--space-4) var(--space-12);
  background-color: var(--color-secondary);
  color: var(--color-text);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-sm);
  cursor: pointer;
  transition: background-color var(--duration-fast) var(--ease-standard);
}

.reorder-btn:hover {
  background-color: var(--color-secondary-hover);
}

.reorder-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.timer-display {
  font-size: var(--font-size-2xl);
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  padding: var(--space-8) var(--space-16);
  background-color: var(--color-bg-1);
  border-radius: var(--radius-base);
  border: 2px solid var(--color-border);
}

.timer-display.warning {
  color: var(--color-red-500);
  animation: pulse 1s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}

.submit-btn {
  padding: var(--space-12) var(--space-24);
  background-color: var(--color-primary);
  color: var(--color-white);
  border: none;
  border-radius: var(--radius-base);
  font-size: var(--font-size-base);
  font-weight: var(--font-weight-semibold);
  cursor: pointer;
  transition: background-color var(--duration-fast) var(--ease-standard);
}

.submit-btn:hover {
  background-color: var(--color-primary-hover);
}

.submit-btn.highlight {
  animation: pulse 1s infinite;
  background-color: var(--color-red-500);
}

.upload-instruction {
  color: var(--color-text-secondary);
  margin-bottom: var(--space-16);
}

.image-upload-input {
  display: block;
  margin: 0 auto var(--space-16);
  padding: var(--space-8);
  font-size: var(--font-size-sm);
}

.uploaded-images {
  display: flex;
  gap: var(--space-16);
  justify-content: center;
  flex-wrap: wrap;
  margin-top: var(--space-16);
}

.uploaded-image {
  width: 120px;
  height: 120px;
  object-fit: cover;
  border-radius: var(--radius-base);
  border: 2px solid var(--color-border);
}

.start-test-btn {
  padding: var(--space-16) var(--space-32);
  background-color: var(--color-primary);
  color: var(--color-white);
  border: none;
  border-radius: var(--radius-base);
  font-size: var(--font-size-lg);
  font-weight: var(--font-weight-semibold);
  cursor: pointer;
  transition: background-color var(--duration-fast) var(--ease-standard);
}

.start-test-btn:hover {
  background-color: var(--color-primary-hover);
}

.start-test-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* Part Content */
.part-content {
  max-width: 1200px;
}

/* Parts 1-3: Side-by-side layout for text and questions */
.part-content-wrapper {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--space-24);
  margin-bottom: var(--space-24);
}

/* When text is hidden, make the questions take full width */
.part-content-wrapper.text-hidden {
  grid-template-columns: 1fr;
}

/* Part 4 passage: keep visible while scrolling questions */
.part4-text {
  position: sticky;
  top: 80px; /* default, overridden by JS to match settings panel height */
  align-self: start;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  padding-right: var(--space-8);
}
/* On small screens we keep sticky but JS will compute the correct `top` so it doesn't sit under the top bar. */

.text-area {
  padding: var(--space-16);
  border-right: 1px solid var(--color-border);
  max-height: 70vh;
  overflow-y: auto;
}

.text-area.hidden {
  display: none;
}

.questions-area {
  overflow-y: auto;
  max-height: 70vh;
}

@media (max-width: 768px) {
  .part-content-wrapper {
    grid-template-columns: 1fr;
  }
  
  .text-area {
    border-right: none;
    border-bottom: 1px solid var(--color-border);
    max-height: 50vh;
  }
}

.part-title {
  font-size: var(--font-size-2xl);
  margin-bottom: var(--space-24);
  color: var(--color-text);
}

.passage {
  background-color: var(--color-surface);
  padding: var(--space-24);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-card-border);
  margin-bottom: var(--space-24);
  line-height: 1.8;
  transition: background-color var(--duration-normal) var(--ease-standard);
}

.passage p {
  margin: 0 0 0.5em 0;
}

.passage p:last-child {
  margin-bottom: 0;
}

.passage.hidden {
  display: none;
}

/* Part 2: tabbed passage panels */
.passage-tabs {
  display: flex;
  flex-direction: column;
  gap: var(--space-12);
}
.tab-buttons {
  display: flex;
  gap: var(--space-8);
}
.tab-button {
  padding: 8px 12px;
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-weight: var(--font-weight-medium);
}
.tab-button.active {
  background: var(--color-primary);
  color: var(--color-white);
  border-color: var(--color-primary);
}
.passage-panel {
  background: var(--color-surface);
  padding: var(--space-16);
  border-radius: var(--radius-md);
  border: 1px solid var(--color-card-border);
  overflow: auto;
  max-height: 46vh;
}
@media (max-width: 768px) {
  .passage-panel { max-height: 28vh; }
}

.passage-title {
  font-size: var(--font-size-xl);
  font-weight: var(--font-weight-semibold);
  margin-bottom: var(--space-16);
  color: var(--color-text);
}

.question-block {
  background-color: var(--color-surface);
  padding: var(--space-20);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-card-border);
  margin-bottom: var(--space-20);
  transition: background-color var(--duration-normal) var(--ease-standard);
}

.question-badge {
  display: inline-flex;
  align-items: center;
  padding: 4px 10px;
  margin-bottom: 10px;
  border-radius: 999px;
  background: var(--color-bg-1);
  color: var(--color-primary);
  font-size: var(--font-size-xs);
  font-weight: var(--font-weight-semibold);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.question-text {
  font-weight: var(--font-weight-medium);
  margin-bottom: var(--space-16);
  color: var(--color-text);
  line-height: 1.6;
}

.options {
  display: flex;
  flex-direction: column;
  gap: var(--space-12);
}

.option-label {
  display: flex;
  align-items: flex-start;
  padding: var(--space-12) var(--space-16);
  background-color: var(--color-background);
  border: 2px solid var(--color-border);
  border-radius: var(--radius-base);
  cursor: pointer;
  transition: all var(--duration-fast) var(--ease-standard);
  min-height: 44px;
}

.options:not(.choice-grid) .option-label {
  align-items: center;
}

.option-label:hover {
  border-color: var(--color-primary);
  background-color: var(--color-bg-1);
}

.option-label.selected {
  border-color: var(--color-primary);
  background-color: var(--color-bg-1);
}

.option-radio {
  margin-right: var(--space-12);
  margin-top: 2px;
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  cursor: pointer;
}

.options:not(.choice-grid) .option-radio {
  margin-top: 0;
}

.option-text {
  flex: 1;
  line-height: 1.5;
}

.options:not(.choice-grid) .option-text {
  display: flex;
  align-items: center;
}

.options.choice-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: var(--space-12);
}

.option-label.choice-card {
  flex-direction: column;
  align-items: stretch;
  gap: var(--space-8);
  min-height: 100%;
}

.option-label.choice-card .option-radio {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}

.option-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 999px;
  background: var(--color-secondary);
  color: var(--color-text);
  font-weight: var(--font-weight-semibold);
  flex-shrink: 0;
}

.option-label.choice-card .option-chip {
  margin-bottom: 2px;
}

.option-label.part2-option .option-chip,
.option-label.part4-option .option-chip {
  margin-right: 6px;
}

.option-media {
  width: 100%;
  aspect-ratio: 4 / 3;
  border-radius: var(--radius-base);
  overflow: hidden;
  background: var(--color-secondary);
  border: 1px solid var(--color-border);
}

.option-media img {
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.option-label.choice-card.selected .option-chip,
.option-label.choice-card:hover .option-chip {
  background: var(--color-primary);
  color: var(--color-white);
}

.option-label.choice-card.selected .option-media,
.option-label.choice-card:hover .option-media {
  border-color: var(--color-primary);
}

/* Part 4 Layout */
.part4-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: var(--space-24);
}

/* Part 5 - Fill Gaps */
.gap-text {
  background-color: var(--color-surface);
  padding: var(--space-24);
  border-radius: var(--radius-lg);
  border: 1px solid var(--color-card-border);
  line-height: 2;
  font-size: var(--font-size-base);
}

.gap-text .gap-line {
  display: flex;
  flex-wrap: wrap;
  align-items: center;
  gap: 8px;
  margin-bottom: 22px;
}

.gap-input-wrapper {
  display: inline-block;
  position: relative;
  margin: 0 var(--space-4);
}

.gap-input-wrapper--compact {
  margin-left: 0;
}

.gap-inline-prefix,
.gap-inline-suffix {
  white-space: nowrap;
}

.gap-number {
  display: inline-block;
  font-weight: var(--font-weight-bold);
  color: var(--color-primary);
  cursor: pointer;
  padding: var(--space-4) var(--space-8);
  background-color: var(--color-bg-1);
  border-radius: var(--radius-sm);
  min-width: 80px;
  text-align: center;
  border: 2px solid transparent;
  transition: border-color var(--duration-fast) var(--ease-standard);
}

.gap-number:hover {
  border-color: var(--color-primary);
}

.gap-input {
  display: inline-block;
  padding: var(--space-4) var(--space-8);
  border: 2px solid var(--color-primary);
  border-radius: var(--radius-sm);
  font-size: var(--font-size-base);
  font-family: var(--font-family-base);
  min-width: 100px;
  background-color: var(--color-surface);
  color: var(--color-text);
}

body.dark-mode .gap-input,
body.dark-mode .writing-textarea {
  background-color: rgba(60, 60, 60, 1);
  color: var(--color-gray-200);

    function loadState() {

    function normalizeListeningOption(option, index) {
      const label = String.fromCharCode(65 + index);
      if (option == null) {
        return { label, text: '', image: '', alt: '' };
      }
      if (typeof option === 'string') {
        return { label, text: option, image: '', alt: '' };
      }
      if (typeof option === 'object') {
        return {
          label: option.label || label,
          text: option.text ?? option.value ?? option.caption ?? '',
          image: option.image ?? option.src ?? option.url ?? '',
          alt: option.alt ?? option.imageAlt ?? option.label ?? ''
        };
      }
      return { label, text: String(option), image: '', alt: '' };
    }

    function normalizeListeningOptions(options) {
      if (!options) return [];
      if (Array.isArray(options)) return options.map((opt, index) => normalizeListeningOption(opt, index));
      if (typeof options === 'object') {
        return Object.keys(options).sort().map((key, index) => {
          const normalized = normalizeListeningOption(options[key], index);
          normalized.label = key;
          return normalized;
        });
      }
      return [];
    }

    function createListeningShell() {

        part1: { title: 'Part 1 - Questions 1-7', questions: {} },
        part2: { title: 'Part 2 - Questions 8-13', questions: {} },
        part3: { title: 'Part 3 - Questions 14-19', questions: {} },

    function applyEditorDraftToTestData(draft) {
      if (!draft || !Array.isArray(draft.questions)) return false;

      const next = createListeningShell();
      const explicit = [];

      draft.questions.forEach((q, idx) => {
        const normalizedDraftOptions = normalizeListeningOptions(q.options);
        const entry = {
          question: q.questionText || q.text || q.question || `Question ${idx + 1}`,
          type: q.type || (q.part === 'part1'
            ? 'image-choice'
            : q.part === 'part3'
              ? 'gap-fill'
              : normalizedDraftOptions.length
                ? 'multiple-choice'
                : 'short-answer')
        };

        if (normalizedDraftOptions.length) {
          entry.options = normalizedDraftOptions.reduce((acc, option) => {
            acc[option.label || String.fromCharCode(65 + Object.keys(acc).length)] = option;
            return acc;
          }, {});
        }

        if (q.correctAnswer != null) entry.correctAnswer = q.correctAnswer;
        if (q.answer != null) entry.answer = q.answer;

        if (q.part && q.questionNumber != null) {
          const partKey = String(q.part);
          const qnum = Number(q.questionNumber);
          if (!next[partKey]) {
            next[partKey] = { title: partKey, questions: {} };
          }
          next[partKey].questions[qnum] = entry;
          explicit.push(true);
        }
      });

      if (!explicit.length) {
        const qobj = {};
        draft.questions.forEach((q, idx) => {
          const normalizedDraftOptions = normalizeListeningOptions(q.options);
          const entry = {
            question: q.questionText || q.text || q.question || `Question ${idx + 1}`,
            type: q.type || (normalizedDraftOptions.length ? 'multiple-choice' : 'short-answer')
          };
          if (normalizedDraftOptions.length) {
            entry.options = normalizedDraftOptions.reduce((acc, option) => {
              acc[option.label || String.fromCharCode(65 + Object.keys(acc).length)] = option;

          }
          if (q.correctAnswer != null) entry.correctAnswer = q.correctAnswer;

    // Image Upload Handler 
    function handleImageUpload(event) {
      const files = event.target.files;
      if (files.length !== 3) {
        alert('Please select exactly 3 images.');
        event.target.value = '';
        return;
      }

      state.uploadedImages = [];
      const uploadedImagesDiv = document.getElementById('uploadedImages');
      if (uploadedImagesDiv) uploadedImagesDiv.innerHTML = '';

      let loadedCount = 0;
      Array.from(files).forEach((file, index) => {
        const reader = new FileReader();
        reader.onload = function(e) {
          // try to infer order from filename (e.g., story1, story2) if present
          let order = index;
          const m = file.name.match(/(\d+)/);
          if (m) order = parseInt(m[1], 10);
          state.uploadedImages.push({id: index, dataUrl: e.target.result, order: order});
          loadedCount++;

          if (loadedCount === files.length) {
            // sort and normalize orders to 0..n-1
            state.uploadedImages.sort((a, b) => a.order - b.order);
            state.uploadedImages.forEach((it, i) => it.order = i);
            renderImagePreviews();
            // persist uploaded images
            saveState();
          }
        };
        reader.readAsDataURL(file);
      });
    }

    // Render Image Previews with Reorder Controls
    function renderImagePreviews() {
      const container = document.getElementById('uploadedImages');
      if (!container) return; // nothing to render into
      container.innerHTML = '';
      
      // Sort images by order
      const sortedImages = [...state.uploadedImages].sort((a, b) => a.order - b.order);
      
      sortedImages.forEach((img, index) => {
        const box = document.createElement('div');
        box.className = 'image-preview-box';
        
        const imgElement = document.createElement('img');
        imgElement.src = img.dataUrl;
        imgElement.dataset.originalUrl = img.dataUrl;
        imgElement.dataset.attempts = '0';
        imgElement.onerror = function() { handleImageError(this); };
        imgElement.alt = `Image ${index + 1}`;
        
        const controls = document.createElement('div');
        controls.className = 'reorder-buttons';
        
        const upBtn = document.createElement('button');
        upBtn.className = 'reorder-btn';
        upBtn.textContent = '↑ Up';
        upBtn.disabled = index === 0;
        upBtn.onclick = () => moveImage(index, -1);
        
        const downBtn = document.createElement('button');
        downBtn.className = 'reorder-btn';
        downBtn.textContent = '↓ Down';
        downBtn.disabled = index === sortedImages.length - 1;
        downBtn.onclick = () => moveImage(index, 1);
        
        controls.appendChild(upBtn);
        controls.appendChild(downBtn);
        
        box.appendChild(imgElement);
        box.appendChild(controls);
        container.appendChild(box);
      });
    }

      // Image error handler tries alternate extensions then falls back to placeholder
      function handleImageError(imgEl) {
        try {
          const orig = imgEl.dataset.originalUrl || imgEl.src || '';
          if (!orig) {
            imgEl.src = makePlaceholderDataUrl();
            return;
          }

          // if data URL, give up and set placeholder
          if (orig.startsWith('data:')) {
            imgEl.src = makePlaceholderDataUrl();
            return;
          }

          const extMatches = orig.match(/\.(jpg|jpeg|png)$/i);
          const base = extMatches ? orig.replace(/\.(jpg|jpeg|png)$/i, '') : orig;
          const exts = ['.jpg', '.jpeg', '.png'];
          let attempts = parseInt(imgEl.dataset.attempts || '0', 10);

          if (attempts < exts.length) {
            const next = base + exts[attempts];
            imgEl.dataset.attempts = String(attempts + 1);
            // set new onerror so recursion continues
            imgEl.onerror = function() { handleImageError(this); };
            imgEl.src = next;
          } else {
            imgEl.src = makePlaceholderDataUrl();
          }
        } catch (e) {
          imgEl.src = makePlaceholderDataUrl();
        }
      }

      function makePlaceholderDataUrl() {
        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='300' height='200'><rect width='100%' height='100%' fill='%23f3f4f6'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' fill='%23777' font-size='16'>No image</text></svg>`;
        return 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
      }

    // Move Image Up or Down
    function moveImage(currentIndex, direction) {
      const sortedImages = [...state.uploadedImages].sort((a, b) => a.order - b.order);
      const newIndex = currentIndex + direction;

      if (newIndex < 0 || newIndex >= sortedImages.length) return;

      // Swap orders in the original state.uploadedImages by id
      const idA = sortedImages[currentIndex].id;
      const idB = sortedImages[newIndex].id;
      const itemA = state.uploadedImages.find(i => i.id === idA);
      const itemB = state.uploadedImages.find(i => i.id === idB);
      if (itemA && itemB) {
        const tmp = itemA.order;
        itemA.order = itemB.order;
        itemB.order = tmp;
      }

      renderImagePreviews();
      // persist new order
      saveState();
    }

    function submitTest() {
      // Ask for confirmation first
      if (!confirm('Are you sure you want to submit your test?')) {

      }

      // Ask candidate for full name (Name Surname) before sending
      let fullName = '';
      while (true) {
        fullName = prompt('Please enter your full name (Name and Surname) before submitting:');
        if (fullName === null) {
          // User cancelled
          alert('Submission cancelled. You can submit when ready.');

        }
        fullName = fullName.trim();
        if (fullName.length === 0) {
          alert('Name cannot be empty. Please enter your full name.');
          continue;
        }
        // Simple validation: require at least two words
        if (!/\s+/.test(fullName)) {
          if (!confirm('It looks like you entered only one name. Do you want to continue with this?')) {

          }
        }
        break;

      // Save candidate name in state for later use

      // Create mailto link with recipient set to timothy@english-world.it

      const mailtoLink = `mailto:${recipient}?subject=B1%20Listening%20Test%20-%20Submission%20${encodeURIComponent(timestamp)}&body=${emailBody}`;

    // Update Part 4 sticky top/height to account for the settings panel and viewport
    function updatePart4Sticky() {
      const settingsPanel = document.getElementById('settingsPanel');
      const contentArea = document.getElementById('contentArea');
      const part4Areas = document.querySelectorAll('.part4-text');
      const settingsRect = settingsPanel ? settingsPanel.getBoundingClientRect() : {bottom: 0};
      const contentRect = contentArea ? contentArea.getBoundingClientRect() : {top: 0};
      // offset relative to the content area's top (sticky is relative to its scroll container)
      const offset = Math.max(0, settingsRect.bottom - contentRect.top);
      const extraSpacing = 6; // small gap below the settings panel

      part4Areas.forEach(el => {
        // On very small screens pin the passage to the top (fixed) so it appears directly under the top bar
        if (window.innerWidth <= 480) {
          // compute top relative to viewport: settingsRect.bottom is viewport coordinate
          const topPx = settingsRect.bottom + extraSpacing;
          el.style.position = 'fixed';
          el.style.top = topPx + 'px';
          // position horizontally to match content area
          el.style.left = contentRect.left + 'px';
          el.style.width = contentRect.width + 'px';
          el.style.overflowY = 'auto';
          // cap height to a reasonable fraction so questions remain visible
          const cap = Math.floor(window.innerHeight * 0.35); // 35% of viewport height
          let max = window.innerHeight - (settingsRect.bottom) - (extraSpacing * 2);
          max = Math.min(max, cap);
          el.style.maxHeight = (max > 80 ? max + 'px' : '80px');
          el.style.zIndex = 40; /* below sidebar (50) and below settings-panel (100) */

          // Reserve space for the fixed passage by adding top margin to the questions area
          const wrapper = el.closest('.part-content-wrapper');
          if (wrapper) {
            const questions = wrapper.querySelector('.questions-area');
            if (questions) {
              questions.style.marginTop = (parseInt(el.style.maxHeight, 10) + extraSpacing) + 'px';
            }
          }
        } else {
          // Default behavior: sticky within content area
          el.style.position = 'sticky';
          el.style.top = (offset + extraSpacing) + 'px';
          el.style.left = '';
          el.style.width = '';
          el.style.overflowY = 'auto';
          let max = window.innerHeight - (settingsRect.bottom) - (extraSpacing * 2);
          el.style.maxHeight = (max > 120 ? max + 'px' : '120px');
          el.style.zIndex = 2;

          // Clear any reserved margin on questions area
          const wrapper = el.closest('.part-content-wrapper');
          if (wrapper) {
            const questions = wrapper.querySelector('.questions-area');
            if (questions) {
              questions.style.marginTop = '';
            }
          }
        }
      });
    }

    // Initialize
    window.addEventListener('load', function() {
      // Try to restore saved state from localStorage
      const restored = loadState();
      if (restored) {
        showAutosaveStatus('Restored previous answers', 'ok');
      }

      // apply collapsed state if set
      const panel = document.getElementById('settingsPanel');
      if (panel) {
        panel.classList.toggle('collapsed', !!state.settingsCollapsed);
        const btn = document.getElementById('settingsToggleBtn');
        if (btn) btn.textContent = state.settingsCollapsed ? '☰' : '✕';
      }

      // Set initial font size
      changeFontSize(state.fontSize);

      // apply color scheme if restored
      if (restored) {
        if (state.colorScheme === 'dark') document.body.classList.add('dark-mode');
        if (state.colorScheme === 'warm') document.body.classList.add('warm-mode');
      }

      // Ensure sidebar position accounts for the settings panel height
      syncSidebarState(false);

      // Update sidebar top on resize and update Part 4 sticky sizing
      window.addEventListener('resize', () => {
        syncSidebarState(false);
        updatePart4Sticky();
      });

      // Ensure Part 4 sticky is set on load
      updatePart4Sticky();

      // Provide default images (optional)
      const defaultImageUrls = [
        './assets/story1.jpg',
        './assets/story2.jpg',
        './assets/story3.jpg'
      ];
      if (!state.uploadedImages || state.uploadedImages.length === 0) {
        state.uploadedImages = defaultImageUrls.map((url, i) => ({ id: i, dataUrl: url, order: i }));
      }

      // Show test content and render the current part
      const testContent = document.getElementById('testContent');
      if (testContent) testContent.style.display = 'block';
      if (settingsPanel) settingsPanel.style.display = 'block';
      showPart(Math.min(4, Math.max(1, Number(state.currentPart) || 1)));

      // Recompute sticky offsets when orientation changes
      window.addEventListener('orientationchange', updatePart4Sticky);
    });
  </script>
</body>
</html>
