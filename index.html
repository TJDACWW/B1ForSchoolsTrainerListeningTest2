<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>B1 Listening Test</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      background: #f8f6f1;
      color: #13343b;
      font-family: Arial, sans-serif;
    }

    .loading {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .loading a {
      color: #1d7480;
    }
  </style>
  <script>
    (function () {
      fetch('exercise1.html')
        .then(function (response) {
          if (!response.ok) {
            throw new Error('Failed to load exercise1.html');
          }
          return response.text();
        })
        .then(function (html) {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function () {
          document.body.innerHTML = '<div class="loading">The test could not be loaded automatically. <a href="exercise1.html">Open the test page</a>.</div>';
        });
    }());
  </script>
</head>
<body>
  <div class="loading">Loading the test...</div>
</body>
</html>
