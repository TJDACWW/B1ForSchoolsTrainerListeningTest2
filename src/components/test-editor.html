<div class="test-editor">
  <h1>Editing: [Level] - Test [Number], [Component]</h1>

  <!-- Preview Toggle -->
  <button id="togglePreview">Toggle Preview Mode</button>

  <!-- Editor or Preview Area (switched based on toggle) -->
  <div id="editorArea" class="active">
    <h2>Questions</h2>
    <table id="questionsTable">
      <thead>
        <tr>
          <th>Question ID</th>
          <th>Text</th>
          <th>Options (if applicable)</th>
          <th>Correct Answer</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- Questions will be listed here -->
      </tbody>
    </table>
    <button id="addQuestion">Add New Question</button>

    <div class="editor-controls">
      <label for="versionNote">Version note:</label>
      <input type="text" id="versionNote" name="versionNote" placeholder="e.g. updated options, 2026-02-19">
      <button id="saveTest">Save / Download JSON</button>
    </div>

    <h2>Answers</h2>
    <div id="answersSection">
      <!-- Answers will be displayed and edited here -->
    </div>
  </div>

  <!-- Question Edit Modal -->
  <style>
  /* Modal styles tuned to match exercise1.html variables */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 300;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .modal {
    background: rgba(255,255,255,0.98);
    color: var(--color-text);
    border: 1px solid var(--color-card-border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-md);
    width: 100%;
    max-width: 820px;
    padding: 20px;
  }
  .modal h3 { margin-bottom: 12px; font-size: var(--font-size-xl); }
  .modal .form-row { margin-bottom: 12px; }
  .modal label { display:block; margin-bottom:6px; color:var(--color-text-secondary); font-size:var(--font-size-sm); }
  .modal input[type="text"], .modal textarea, .modal select { width:100%; padding:var(--space-8); border-radius:var(--radius-sm); border:1px solid var(--color-border); background:var(--color-background); color:var(--color-text); font-size:var(--font-size-base); }
  .modal .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:12px; }
  .modal .modal-option-row { display:grid; grid-template-columns: 44px minmax(0, 1fr) minmax(0, 1fr) auto; gap:8px; align-items:start; margin-bottom:8px; }
  .modal .modal-option-label { display:flex; align-items:center; justify-content:center; min-height:42px; border-radius:6px; background:var(--color-secondary); color:var(--color-text); font-weight:var(--font-weight-semibold); }
  .modal .modal-option-input { width:100%; padding:8px; border-radius:6px; border:1px solid var(--color-border); }
  .modal .modal-option-image-input { width:100%; padding:8px; border-radius:6px; border:1px solid var(--color-border); }
  .modal .modal-option-row .remove-option { white-space:nowrap; }
  .modal-help { margin-top:6px; color:var(--color-text-secondary); font-size:var(--font-size-xs); }
  .modal .option-hint { display:block; margin-top:6px; color:var(--color-text-secondary); font-size:var(--font-size-xs); }
  .modal-overlay.hidden { display:none; }
  .modal .error-message { display:block; margin-top:6px; }
  #previewArea {
    margin-top: 20px;
  }
  .test-container {
    display: grid;
    gap: 16px;
  }
  .preview-question {
    border: 1px solid var(--color-card-border);
    border-radius: var(--radius-lg);
    background: var(--color-surface);
    padding: 16px;
  }
  .preview-question-head {
    display:flex;
    justify-content:space-between;
    gap:12px;
    color:var(--color-text-secondary);
    font-size:var(--font-size-sm);
    margin-bottom:8px;
  }
  .preview-question-text {
    margin-bottom: 12px;
    line-height: 1.5;
  }
  .preview-option-grid {
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
  }
  .preview-option {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-base);
    padding: 12px;
    background: var(--color-background);
  }
  .preview-option.correct-answer,
  .preview-option-item.correct-answer {
    border-color: var(--color-primary);
    box-shadow: 0 0 0 1px rgba(33, 128, 141, 0.18);
  }
  .preview-option-key {
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width: 28px;
    height: 28px;
    border-radius:999px;
    background: var(--color-secondary);
    margin-bottom: 8px;
    font-weight: var(--font-weight-semibold);
  }
  .preview-option-media img {
    width: 100%;
    aspect-ratio: 4 / 3;
    object-fit: cover;
    border-radius: var(--radius-sm);
    display:block;
    margin-bottom: 8px;
  }
  .preview-option-list {
    list-style: none;
    display: grid;
    gap: 8px;
  }
  .preview-option-item {
    border: 1px solid var(--color-border);
    border-radius: var(--radius-base);
    padding: 10px 12px;
    display:flex;
    gap:10px;
    align-items:flex-start;
  }
  .preview-answer-note {
    color: var(--color-text-secondary);
    font-size: var(--font-size-sm);
  }
  /* Danger button consistent with theme */
  .danger-btn {
    padding: var(--space-8) var(--space-16);
    background-color: var(--color-red-500);
    color: var(--color-white);
    border: none;
    border-radius: var(--radius-base);
    font-size: var(--font-size-sm);
    cursor: pointer;
  }
  .danger-btn:hover { background-color: var(--color-red-400); }
  </style>

  <div id="questionModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal">
      <h3 id="modalTitle">Edit Question</h3>
      <form id="questionForm">
        <input type="hidden" id="modalQuestionId">
        <div class="form-row">
          <label for="modalQuestionText">Question text</label>
          <textarea id="modalQuestionText" class="modal-textarea" rows="4"></textarea>
        </div>

        <div class="form-row">
          <label for="modalQuestionType">Type</label>
          <select id="modalQuestionType">
            <option value="image-choice">Image choice</option>
            <option value="multiple-choice">Multiple choice</option>
            <option value="short-answer">Short answer</option>
            <option value="gap-fill">Gap fill</option>
          </select>
        </div>

        <div class="form-row">
          <label for="modalPartSelect">Part</label>
          <select id="modalPartSelect">
            <option value="part1">Part 1</option>
            <option value="part2">Part 2</option>
            <option value="part3">Part 3</option>
            <option value="part4">Part 4</option>
            <option value="part5">Part 5</option>
          </select>
        </div>

        <div class="form-row">
          <label for="modalQuestionNumber">Question number</label>
          <input id="modalQuestionNumber" type="number" min="1" placeholder="e.g. 1" />
        </div>
        <div class="form-row">
          <span id="modalError" class="error-message" style="display:none"></span>
        </div>

        <div class="form-row" id="modalOptionsWrapper">
          <label>Options A, B, C</label>
          <span class="option-hint">For Part 1, paste local image paths into the image fields. Example: <code>src/assets/listening/part1/choice-a.svg</code>.</span>
          <div id="modalOptionsContainer"></div>
          <button type="button" id="modalAddOptionBtn">+ Add option</button>
        </div>

        <div class="form-row">
          <label for="modalCorrectAnswer">Correct answer</label>
          <input id="modalCorrectAnswer" placeholder="A, B, or exact text" />
        </div>

        <div class="modal-actions">
          <button type="button" id="modalSaveBtn" class="toggle-btn">Save</button>
          <button type="button" id="modalCancelBtn" class="toggle-btn inactive">Cancel</button>
          <button type="button" id="modalDeleteBtn" class="danger-btn">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <div id="previewArea" class="hidden">
    <!-- This would render a preview similar to the provided HTML file -->
    <div id="testPreviewContainer"></div>
  </div>
</div>
